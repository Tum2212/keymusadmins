<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Service Links — Admin</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    body { font-family: Arial, Helvetica, sans-serif; margin:20px; background:#0b1220; color:#e6eef8; }
    .card { background:#071226; padding:16px; border-radius:8px; max-width:900px; margin:0 auto; box-shadow:0 8px 30px rgba(0,0,0,0.5); }
    h1{margin:0 0 12px}
    textarea{ width:100%; height:260px; border-radius:8px; padding:12px; box-sizing:border-box; background:#081226; color:#e6eef8; border:1px solid #243449; font-family:monospace; font-size:13px; }
    textarea.light { background:#fff; color:#0b1724; border:1px solid #dfe6f2; }
    .controls{ display:flex; gap:8px; margin-top:8px; align-items:center; flex-wrap:wrap }
    button{ padding:8px 12px; border-radius:8px; border:0; cursor:pointer; background:#0f62ff;color:#fff; }
    button.secondary{ background:transparent; border:1px solid #243449; color:#e6eef8; }
    .muted{ color:#9fb0c9; font-size:13px }
    .danger{ background:#e55353; }
    .inline{ display:flex; gap:8px; align-items:center; }
    .key-input{ padding:6px 8px; border-radius:6px; border:1px solid #243449; background:#0b1220; color:#e6eef8; }
    .light .key-input{ background:#fff; color:#0b1724; border:1px solid #dfe6f2; }
    pre.json-preview{ background:#071226; color:#cfe3ff; padding:12px; border-radius:8px; overflow:auto; border:1px solid #243449; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Service Links editor</h1>
    <div class="muted">Edit service-links.json (saved to DB and mirrored to public/service-links.json). Changes require admin login.</div>

    <div style="margin-top:12px;">
      <textarea id="jsonArea" spellcheck="false"></textarea>
    </div>

    <div class="controls">
      <button id="saveBtn">Save</button>
      <button id="reloadBtn" class="secondary">Reload</button>
      <button id="togglePreview" class="secondary">Toggle Preview</button>
      <div style="flex:1"></div>
      <div class="inline">
        <input id="newKey" class="key-input" placeholder="key (eg: telegram3)" />
        <input id="newVal" class="key-input" placeholder="value (eg: https://t.me/your)" />
        <button id="addBtn" class="secondary">Add</button>
      </div>
    </div>

    <div id="previewWrap" style="margin-top:12px;display:none;">
      <strong>Preview</strong>
      <pre id="jsonPreview" class="json-preview"></pre>
      <div style="margin-top:8px;">
        <button id="deleteSelected" class="danger">Delete Selected Keys</button>
      </div>
    </div>

    <div id="status" style="margin-top:10px" class="muted"></div>
  </div>

  <script>
    const token = localStorage.getItem('adminToken');
    if (!token) { alert('Please login'); location.href = '/admin-panel/login.html'; }

    const jsonArea = document.getElementById('jsonArea');
    const jsonPreview = document.getElementById('jsonPreview');
    const previewWrap = document.getElementById('previewWrap');
    const statusEl = document.getElementById('status');

    async function load() {
      status('Loading...');
      try {
        const res = await fetch('/admin/service-links', { headers: { 'x-admin-token': token } });
        if (!res.ok) {
          const txt = await res.text().catch(()=>res.statusText);
          status('Load failed: ' + txt);
          return;
        }
        const j = await res.json();
        const data = j.data || {};
        jsonArea.value = JSON.stringify(data, null, 2);
        jsonPreview.textContent = JSON.stringify(data, null, 2);
        setLightModeIfNeeded();
        status('Loaded from ' + (j.source || 'db/file'));
      } catch (err) {
        status('Failed to load: ' + err.message);
      }
    }

    async function save() {
      let parsed;
      try {
        parsed = JSON.parse(jsonArea.value);
      } catch (e) {
        alert('Invalid JSON: ' + e.message);
        return;
      }
      status('Saving...');
      try {
        const res = await fetch('/admin/service-links', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
          body: JSON.stringify(parsed)
        });
        const body = await res.json().catch(()=>({}));
        if (!res.ok) {
          status('Save failed: ' + (body.message || res.statusText));
          return;
        }
        status('Saved successfully');
        jsonPreview.textContent = JSON.stringify(parsed, null, 2);
      } catch (err) {
        status('Save failed: ' + err.message);
      }
    }

    function status(m) { statusEl.textContent = m; }

    // add new key/value into the JSON in the editor
    document.getElementById('addBtn').addEventListener('click', () => {
      const k = document.getElementById('newKey').value.trim();
      const v = document.getElementById('newVal').value.trim();
      if (!k) { alert('Key required'); return; }
      let obj = {};
      try { obj = JSON.parse(jsonArea.value || '{}'); } catch(e) { alert('Invalid JSON editor content'); return; }
      obj[k] = v;
      jsonArea.value = JSON.stringify(obj, null, 2);
      jsonPreview.textContent = jsonArea.value;
      document.getElementById('newKey').value=''; document.getElementById('newVal').value='';
    });

    document.getElementById('saveBtn').addEventListener('click', save);
    document.getElementById('reloadBtn').addEventListener('click', load);
    document.getElementById('togglePreview').addEventListener('click', () => {
      previewWrap.style.display = (previewWrap.style.display === 'none' ? 'block' : 'none');
    });

    // Delete selected keys: prompts user with keys to delete, then calls admin endpoint /admin/service-links/delete-keys
    document.getElementById('deleteSelected').addEventListener('click', async () => {
      let obj;
      try { obj = JSON.parse(jsonArea.value || '{}'); } catch(e) { alert('Invalid JSON'); return; }
      const keys = Object.keys(obj);
      if (!keys.length) { alert('No keys to delete'); return; }
      const toDelete = prompt('Enter comma-separated keys to delete (available: ' + keys.join(', ') + ')');
      if (!toDelete) return;
      const keysArr = toDelete.split(',').map(s=>s.trim()).filter(Boolean);
      if (!keysArr.length) return;
      if (!confirm('Delete keys: ' + keysArr.join(', ') + ' ?')) return;

      try {
        const res = await fetch('/admin/service-links/delete-keys', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'x-admin-token': token },
          body: JSON.stringify({ keys: keysArr })
        });
        const body = await res.json().catch(()=>({}));
        if (!res.ok) { alert('Delete failed: ' + (body.message || res.statusText)); return; }
        jsonArea.value = JSON.stringify(body.data || {}, null, 2);
        jsonPreview.textContent = jsonArea.value;
        status('Deleted keys and saved');
      } catch (err) {
        alert('Delete failed: ' + err.message);
      }
    });

    function setLightModeIfNeeded() {
      const theme = localStorage.getItem('adminTheme') || 'dark';
      if (theme === 'light') {
        jsonArea.classList.add('light');
        document.body.classList.add('light');
      } else {
        jsonArea.classList.remove('light');
        document.body.classList.remove('light');
      }
    }

    load();
  </script>
</body>
</html>
